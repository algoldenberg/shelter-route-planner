version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: shelter-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - shelter-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: shelter-redis
    ports:
      - "6379:6379"
    networks:
      - shelter-network
    restart: unless-stopped

  shelter-service:
    build: ./services/shelter-service
    container_name: shelter-service
    ports:
      - "18001:8001"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=shelter_planner
      - MONGO_USERNAME=admin
      - MONGO_PASSWORD=changeme123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ./services/shelter-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - shelter-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  route-service:
    build: ./services/route-service
    container_name: route-service
    ports:
      - "18002:8002"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=shelter_planner
      - MONGO_USERNAME=admin
      - MONGO_PASSWORD=changeme123
      - MONGODB_URL=mongodb://admin:changeme123@mongodb:27017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OSRM_URL=http://osrm-backend:5000
    depends_on:
      - mongodb
      - redis
      - osrm-backend
    networks:
      - shelter-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  comment-service:
    build: ./services/comment-service
    container_name: comment-service
    ports:
      - "18003:8003"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=shelter_planner
      - MONGO_USERNAME=admin
      - MONGO_PASSWORD=changeme123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis
    networks:
      - shelter-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload

  walking-route-service:
    build: ./services/walking-route-service
    container_name: walking-route-service
    ports:
      - "18004:8004"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=shelter_planner
      - MONGO_USERNAME=admin
      - MONGO_PASSWORD=changeme123
      - OSRM_URL=http://osrm-backend:5000
      - OVERPASS_URL=https://overpass-api.de/api/interpreter
    depends_on:
      - mongodb
      - osrm-backend
    networks:
      - shelter-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "18000:8000"
    volumes:
      - ./services/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - SHELTER_SERVICE_URL=http://shelter-service:8001
      - ROUTE_SERVICE_URL=http://route-service:8002
      - COMMENT_SERVICE_URL=http://comment-service:8003
      - WALKING_ROUTE_SERVICE_URL=http://walking-route-service:8004
    depends_on:
      - shelter-service
      - route-service
      - comment-service
      - walking-route-service
    networks:
      - shelter-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.shelternearyou.online
        VITE_HCAPTCHA_SITE_KEY: ${VITE_HCAPTCHA_SITE_KEY}
    container_name: frontend
    ports:
      - "13000:80"
    environment:
      - VITE_API_URL=https://api.shelternearyou.online
    depends_on:
      - api-gateway
    networks:
      - shelter-network

  osrm-backend:
    image: osrm/osrm-backend:latest
    container_name: osrm-backend
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/israel-and-palestine-latest.osrm
    ports:
      - "15000:5000"
    networks:
      - shelter-network
    restart: unless-stopped

networks:
  shelter-network:
    driver: bridge

volumes:
  mongodb_data: