apiVersion: apps/v1
kind: Deployment
metadata:
  name: osrm-backend
  namespace: shelter-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osrm-backend
  template:
    metadata:
      labels:
        app: osrm-backend
    spec:
      containers:
      - name: osrm-backend
        image: ghcr.io/project-osrm/osrm-backend:latest
        ports:
        - containerPort: 5000
        command: ["osrm-routed", "--algorithm", "mld", "/data/israel-and-palestine-latest.osrm"]
        volumeMounts:
        - name: osrm-data
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      initContainers:
      - name: osrm-init
        image: ghcr.io/project-osrm/osrm-backend:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            if [ ! -f /data/israel-and-palestine-latest.osrm ]; then
              wget -O /data/israel-and-palestine-latest.osm.pbf https://download.geofabrik.de/asia/israel-and-palestine-latest.osm.pbf
              osrm-extract -p /opt/car.lua /data/israel-and-palestine-latest.osm.pbf
              osrm-partition /data/israel-and-palestine-latest.osrm
              osrm-customize /data/israel-and-palestine-latest.osrm
            fi
        volumeMounts:
        - name: osrm-data
          mountPath: /data
      volumes:
      - name: osrm-data
        emptyDir: {}