apiVersion: apps/v1
kind: Deployment
metadata:
  name: route-service
  namespace: shelter-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: route-service
  template:
    metadata:
      labels:
        app: route-service
    spec:
      containers:
      - name: route-service
        image: ghcr.io/algoldenberg/shelter-route-planner/route-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: MONGODB_URL
          value: "mongodb://admin:shelterpass123@mongodb:27017"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: OSRM_URL
          value: "http://osrm-backend:5000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"