apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: shelter-app
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: shelter-app
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: osrm-backend
  namespace: shelter-app
spec:
  selector:
    app: osrm-backend
  ports:
  - port: 5000
    targetPort: 5000